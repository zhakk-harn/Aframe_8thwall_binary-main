<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>08 — Gaussian Splat</title>

  <!-- AR Libraries -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- Import map: route bare "three" imports to 8frame's global THREE.
       Also map "three/" prefix to esm.sh r137 so Zappar's internal addon
       imports (e.g. three/examples/jsm/...) resolve correctly.
       (Spark.js requires r178+ which is incompatible with 8frame's renderer.) -->
  <script>
    (function () {
      // Build ES module shim re-exporting window.THREE
      var keys = Object.keys(window.THREE).filter(function (k) {
        return /^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(k);
      });
      var code = keys.map(function (k) {
        return 'export const ' + k + ' = window.THREE["' + k + '"];';
      }).join('\n') + '\nexport default window.THREE;\n';
      var blob = new Blob([code], {type: 'text/javascript'});
      var url = URL.createObjectURL(blob);

      var map = document.createElement('script');
      map.type = 'importmap';
      map.textContent = JSON.stringify({imports: {
        'three': url,
        'three/': 'https://esm.sh/three@0.137.0/'
      }});
      document.currentScript.after(map);
    })();
  </script>

  <!-- Monkey-patch Worker to handle cross-origin URLs.
       Zappar creates a module Worker from an esm.sh URL which browsers block
       (same-origin policy). We fetch the script text, rewrite relative imports
       to absolute URLs, and create a blob worker. -->
  <script>
    (function () {
      var OriginalWorker = window.Worker;
      window.Worker = function PatchedWorker(url, options) {
        var href = (url instanceof URL) ? url.href : String(url);
        var isCrossOrigin = false;
        try { isCrossOrigin = new URL(href).origin !== location.origin; } catch(e) {}

        if (!isCrossOrigin) return new OriginalWorker(url, options);

        // Fix Zappar's broken worker URL: esm.sh hashed paths don't resolve ../../
        // Rewrite to the known correct package path
        if (href.includes('@zappar/three-gaussian-splat') && href.includes('cpp-sorter/worker')) {
          href = 'https://esm.sh/@zappar/three-gaussian-splat@0.1.0/lib/cpp-sorter/worker';
          console.log('[Worker patch] rewrote Zappar worker URL to:', href);
        }

        // For cross-origin module workers: fetch the source, absolutise imports, blob it
        var dummy = { onmessage: null, onerror: null, postMessage: function(){}, terminate: function(){} };
        var realWorker = null;
        var pending = [];

        dummy.postMessage = function(msg, transfer) {
          if (realWorker) { realWorker.postMessage(msg, transfer); }
          else { pending.push([msg, transfer]); }
        };
        dummy.terminate = function() {
          if (realWorker) realWorker.terminate();
          else pending = null;
        };

        // Resolve relative imports in the worker source to absolute
        var base = href.substring(0, href.lastIndexOf('/') + 1);
        fetch(href).then(function(r) { return r.text(); }).then(function(code) {
          // Replace relative imports like from"./foo" or from'../bar'
          code = code.replace(/(from\s*["'])(\.{1,2}\/[^"']+)(["'])/g, function(m, p1, rel, p3) {
            return p1 + new URL(rel, base).href + p3;
          });
          // Replace dynamic import("./...")
          code = code.replace(/(import\s*\(\s*["'])(\.{1,2}\/[^"']+)(["']\s*\))/g, function(m, p1, rel, p3) {
            return p1 + new URL(rel, base).href + p3;
          });
          var blob = new Blob([code], {type: 'text/javascript'});
          var blobUrl = URL.createObjectURL(blob);
          realWorker = new OriginalWorker(blobUrl, options);
          realWorker.onmessage = function(e) { if (dummy.onmessage) dummy.onmessage(e); };
          realWorker.onerror = function(e) { if (dummy.onerror) dummy.onerror(e); };
          // Proxy addEventListener for Comlink
          if (dummy._listeners) {
            dummy._listeners.forEach(function(l) { realWorker.addEventListener(l[0], l[1]); });
          }
          // Flush pending messages
          if (pending) { pending.forEach(function(p) { realWorker.postMessage(p[0], p[1]); }); pending = null; }
        }).catch(function(err) { console.error('[Worker patch] failed:', err); });

        // Comlink uses addEventListener, so we must proxy it
        dummy._listeners = [];
        dummy.addEventListener = function(type, fn) {
          if (realWorker) { realWorker.addEventListener(type, fn); }
          else { dummy._listeners.push([type, fn]); }
        };
        dummy.removeEventListener = function(type, fn) {
          if (realWorker) { realWorker.removeEventListener(type, fn); }
        };

        return dummy;
      };
      window.Worker.prototype = OriginalWorker.prototype;
    })();
  </script>

  <!-- 8th Wall Engine -->
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData:[{
          "name": "my-poster",
          "type": "PLANAR",
          "imagePath": "../assets/Targets/Target_1000055040.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 830, "height": 830,
            "originalWidth": 830, "originalHeight": 830,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <!-- Custom component: loads a Gaussian Splat via @zappar/three-gaussian-splat.
       This library uses GLSL ES 1.0 shaders and RawShaderMaterial with basic
       Three.js APIs (InstancedBufferGeometry, BufferAttribute), all available
       since Three.js ~r72 — fully compatible with r137 bundled in 8frame.
       Supports .splat file format. -->
  <script>
    AFRAME.registerComponent('zappar-splat', {
      schema: {
        src: {type: 'string'},
        maxSplats: {type: 'number', default: 0}
      },
      init: async function () {
        try {
          console.log('[splat] init — importing @zappar/three-gaussian-splat …');
          var ZapSplat = await import('https://esm.sh/@zappar/three-gaussian-splat@0.1.0?external=three');
          console.log('[splat] module loaded, exports:', Object.keys(ZapSplat));

          var sceneEl = this.el.sceneEl;
          var camera = sceneEl.camera;
          var renderer = sceneEl.renderer;
          console.log('[splat] camera:', camera, 'renderer:', renderer);

          console.log('[splat] creating GaussianSplatMesh with src:', this.data.src);
          this.splat = new ZapSplat.GaussianSplatMesh(
            this.data.src,
            this.data.maxSplats || undefined
          );

          console.log('[splat] calling load() …');
          await this.splat.load();
          console.log('[splat] load() done — geometry:', this.splat.geometry,
                       'vertexCount:', this.splat.geometry?.attributes?.position?.count);

          this.el.object3D.add(this.splat);
          console.log('[splat] added to entity. splat.visible:', this.splat.visible,
                       'parent worldPos:', this.el.object3D.getWorldPosition(new THREE.Vector3()));

          // The splat needs per-frame sorting updates (camera + renderer required)
          var _camera = camera;
          var _renderer = renderer;
          var _frameCount = 0;
          this._tick = function () {
            if (this.splat) {
              this.splat.update(_camera, _renderer);
              if (_frameCount++ % 300 === 0) {
                console.log('[splat] tick #' + _frameCount,
                            'visible:', this.splat.visible,
                            'worldPos:', this.el.object3D.getWorldPosition(new THREE.Vector3()));
              }
            }
          }.bind(this);
        } catch (err) {
          console.error('[splat] Failed to load Gaussian splat:', err);
        }
      },
      tick: function () {
        if (this._tick) this._tick();
      },
      remove: function () {
        if (this.splat) {
          this.el.object3D.remove(this.splat);
          if (this.splat.dispose) this.splat.dispose();
        }
      }
    });
  </script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    vr-mode-ui="enabled: false"
    xrweb="disableWorldTracking: true">

    <!-- Increase timeout for large splat files -->
    <a-assets timeout="30000">
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="my-poster">

      <!-- Debug cube — confirms tracking works -->
      <a-box color="red" position="0 0.3 0" scale="0.2 0.2 0.2"></a-box>

      <!-- Gaussian Splat — replace src with your own .splat file
           Convert .sog/.ply files at https://playcanvas.com/supersplat/editor
           Scale is critical: splat scenes are often real-world scale
           and need significant scaling down to fit on an image target -->
      <a-entity zappar-splat="src: ../assets/splat_30000.splat"
                position="0 0.5 0"
                scale="0.3 0.3 0.3">
      </a-entity>

    </xrextras-named-image-target>

  </a-scene>
</body>
</html>
