<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>02 — Text & MSDF Fonts</title>

  <!-- AR Libraries -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- 8th Wall Engine -->
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData:[{
          "name": "my-poster",
          "type": "PLANAR",
          "imagePath": "../assets/Targets/Target_1000055040.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 830, "height": 830,
            "originalWidth": 830, "originalHeight": 830,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="my-poster">

      <!-- ============================================================
           1. Default A-Frame text (built-in Roboto SDF font)
           Uses the <a-text> primitive — simplest approach.
           ============================================================ -->
      <a-text value="Default Roboto (SDF)"
              color="white" align="center"
              position="0 2.0 0" width="3"></a-text>

      <!-- ============================================================
           2. MSDF Font — Creepster
           MSDF fonts require:
             - shader: msdf
             - Use <a-entity text="..."> (NOT <a-text>)
           The .png atlas is auto-loaded alongside the .json file.
           ============================================================ -->
      <a-entity text="value: Creepster MSDF;
                      shader: msdf;
                      font: https://raw.githubusercontent.com/etiennepinchon/aframe-fonts/master/fonts/creepster/Creepster-Regular.json;
                      color: #FF0055;
                      align: center;
                      width: 4"
               position="0 1.4 0"></a-entity>

      <!-- ============================================================
           3. MSDF Font — Berkshire Swash
           ============================================================ -->
      <a-entity text="value: Berkshire Swash;
                      shader: msdf;
                      font: https://raw.githubusercontent.com/etiennepinchon/aframe-fonts/master/fonts/berkshireswash/BerkshireSwash-Regular.json;
                      color: #00AAFF;
                      align: center;
                      width: 4"
               position="0 0.8 0"></a-entity>

      <!-- ============================================================
           4. MSDF Font — Crimson Text
           ============================================================ -->
      <a-entity text="value: Crimson Text;
                      shader: msdf;
                      font: https://raw.githubusercontent.com/etiennepinchon/aframe-fonts/master/fonts/crimsontext/CrimsonText-Regular.json;
                      color: #33CC33;
                      align: center;
                      width: 4"
               position="0 0.2 0"></a-entity>

      <!-- ============================================================
           5. Size comparison — same font at different widths
           The "width" attribute controls the text block width,
           which in turn changes the apparent size.
           ============================================================ -->
      <a-entity text="value: Small (width 2);
                      shader: msdf;
                      font: https://raw.githubusercontent.com/etiennepinchon/aframe-fonts/master/fonts/creepster/Creepster-Regular.json;
                      color: #FFAA00;
                      align: center;
                      width: 2"
               position="0 -0.4 0"></a-entity>

      <a-entity text="value: Large (width 6);
                      shader: msdf;
                      font: https://raw.githubusercontent.com/etiennepinchon/aframe-fonts/master/fonts/creepster/Creepster-Regular.json;
                      color: #FFAA00;
                      align: center;
                      width: 6"
               position="0 -0.9 0"></a-entity>

    </xrextras-named-image-target>

  </a-scene>
</body>
</html>
