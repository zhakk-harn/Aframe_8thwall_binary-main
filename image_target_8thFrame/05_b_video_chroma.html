<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>05 — Video Chromakey</title>

  <!-- AR Libraries -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- 8th Wall Engine -->
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData:[{
          "name": "my-poster",
          "type": "PLANAR",
          "imagePath": "../assets/Targets/Target_1000055040.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 830, "height": 830,
            "originalWidth": 830, "originalHeight": 830,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <!-- Component to play/pause video on image target detection -->
  <script>
    AFRAME.registerComponent('video-playback-on-scan', {
      schema: {
        video: {type: 'selector'},
      },
      init: function () {
        this.video = this.data.video;
        if (!this.video) return;

        this.video.pause();

        // xrimagefound/xrimagelost fire on <a-scene>, not on the target element
        this.onFound = () => { this.video.play(); };
        this.onLost = () => { this.video.pause(); };

        this.el.sceneEl.addEventListener('xrimagefound', this.onFound);
        this.el.sceneEl.addEventListener('xrimagelost', this.onLost);
      },
      remove: function () {
        if (this.video) this.video.pause();
        this.el.sceneEl.removeEventListener('xrimagefound', this.onFound);
        this.el.sceneEl.removeEventListener('xrimagelost', this.onLost);
      },
    });
  </script>

   <!-- Custom component: plays/pauses audio when image target is found/lost.
       Events fire on <a-scene>, so we filter by event.detail.name. -->
        <script>
          AFRAME.registerComponent('image-target-audio', {
            schema: {
              src: {type: 'string'},
              target: {type: 'string', default: 'my-poster'}
            },
            init: function () {
              this.audio = new Audio(this.data.src);
              this.audio.loop = true;
      
              this.onImageFound = (e) => {
                if (e.detail.name === this.data.target) {
                  this.audio.play().catch(function (err) {
                    console.warn('Audio play blocked:', err);
                  });
                }
              };
              this.onImageLost = (e) => {
                if (e.detail.name === this.data.target) {
                  this.audio.pause();
                }
              };
      
              this.el.sceneEl.addEventListener('xrimagefound', this.onImageFound);
              this.el.sceneEl.addEventListener('xrimagelost', this.onImageLost);
            },
            remove: function () {
              this.audio.pause();
              this.el.sceneEl.removeEventListener('xrimagefound', this.onImageFound);
              this.el.sceneEl.removeEventListener('xrimagelost', this.onImageLost);
            }
          });
        </script>

  <!-- Chromakey Shader -->
  <script>
    AFRAME.registerShader('chromakey', {
      schema: {
        src: {type: 'map'},
        color: {type: 'color', default: '#00FF00'},
        chroma: {type: 'bool', default: true},
        transparent: {default: true}
      },

      init: function (data) {
        const videoEl = data.src;
        if (!videoEl) { return; }

        var videoTexture = new THREE.VideoTexture(videoEl);
        videoTexture.minFilter = THREE.LinearFilter;
        this.material = new THREE.ShaderMaterial({
          transparent: data.transparent,
          uniforms: {
            chroma: { type: 'b', value: data.chroma },
            color: { type: 'c', value: new THREE.Color(data.color) },
            myTexture: { type: 't', value: videoTexture }
          },
          vertexShader: this.vertexShader,
          fragmentShader: this.fragmentShader
        });
      },

      update: function (data) {
        this.material.uniforms.chroma.value = data.chroma;
        this.material.uniforms.color.value.set(data.color);
        this.material.transparent = data.transparent;
      },

      vertexShader: [
        'varying vec2 vUv;',
        'void main(void) {',
        '  vUv = uv;',
        '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
        '}'
      ].join('\n'),

      fragmentShader: [
        'uniform sampler2D myTexture;',
        'uniform vec3 color;',
        'uniform bool chroma;',
        'varying vec2 vUv;',
        'void main(void) {',
        '  vec3 tColor = texture2D(myTexture, vUv).rgb;',
        '  float a = 1.0;',
        '  if (chroma) {',
        '    a = (length(tColor - color) - 0.75) * 7.0;',
        '  }',
        '  gl_FragColor = vec4(tColor, a);',
        '}'
      ].join('\n')
    });
  </script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-assets>
      <video id="vid" src="../assets/mask_green_sil.mp4"
             loop muted playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <!-- Audio component — replace src with your own audio file -->
    <a-entity image-target-audio="src: ../assets/634332__josefpres__bass-loops-077-with-drums-long-loop-120-bpm.mp3; target: my-poster"></a-entity>

    <xrextras-named-image-target name="my-poster" video-playback-on-scan="video: #vid">
      <a-entity
        geometry="primitive: plane; width: 2; height: 1.5"
        material="shader: chromakey; src: #vid; chroma: true; color: #00FF00;"
        position="0 0.0 0">
      </a-entity>
    </xrextras-named-image-target>

  </a-scene>
</body>
</html>
