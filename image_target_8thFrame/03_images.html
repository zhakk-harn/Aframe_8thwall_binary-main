<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>03 — Images</title>

  <!-- AR Libraries -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- 8th Wall Engine -->
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData:[{
          "name": "my-poster",
          "type": "PLANAR",
          "imagePath": "../assets/Targets/Target_1000055040.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 830, "height": 830,
            "originalWidth": 830, "originalHeight": 830,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <!-- Preload image asset -->
    <a-assets>
      <img id="export1" src="../assets/export1.png" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="my-poster">

      <!-- Three instances of the same image, stacked along the Y-axis
           (perpendicular to the poster surface) with slight Z offsets -->

      <!-- Instance 1 — back layer -->
      <a-image src="#export1" position="0 0.3 0" width="1.5" height="1.5"></a-image>

      <!-- Instance 2 — middle layer -->
      <a-image src="#export1" position="0 0.3 0.3" width="1.5" height="1.5"></a-image>

      <!-- Instance 3 — front layer -->
      <a-image src="#export1" position="0 0.3 0.6" width="1.5" height="1.5"></a-image>

    </xrextras-named-image-target>

  </a-scene>
</body>
</html>
