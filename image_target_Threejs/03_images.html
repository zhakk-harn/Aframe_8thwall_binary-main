<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>03 — Images (Three.js)</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      canvas {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.178.0",
          "three/addons/": "https://esm.sh/three@0.178.0/examples/jsm/"
        }
      }
    </script>

    <!-- 8th Wall Engine -->
    <script async src="../engine/xr.js" data-preload-chunks="slam"></script>
  </head>
  <body>
    <canvas id="xr-canvas"></canvas>

    <script type="module">
      import * as THREE from "three";
      import { startXR8, applyTargetPose } from "./lib/xr8-three-bootstrap.js";

      const targets = [
        {
          name: "my-poster",
          type: "PLANAR",
          imagePath: "../assets/Targets/Target_1000055040.jpg",
          metadata: {
            entity: await (async () => {
              // TODO refactor into a make3DImage(texture, options) or something
              // or subclass the THREE.Mesh class

              const loader = new THREE.TextureLoader();
              const texture = await loader.loadAsync("../assets/export1.png");

              const plane = new THREE.Mesh(
                new THREE.PlaneGeometry(1.5, 1.5),
                new THREE.MeshBasicMaterial({
                  map: texture,
                  transparent: true,
                }),
              );

              plane.position.set(0, 0.3, 0);
              plane.visible = false;

              return plane;
            })(),
          },
          properties: {
            left: 0,
            top: 0,
            width: 830,
            height: 830,
            originalWidth: 830,
            originalHeight: 830,
            isRotated: false,
          },
        },
      ];

      // --- Start XR8 ---
      const { scene } = await startXR8({
        canvas: document.getElementById("xr-canvas"),
        imageTargets: targets,
        onImageFound: (detail) => {
          console.log({ detail });
          applyTargetPose(detail.entity, detail);
          detail.entity.visible = true;
        },
        onImageUpdated: (detail) => {
          applyTargetPose(detail.entity, detail);
        },
        onImageLost: (detail) => {
          detail.entity.visible = false;
        },
      });

      for (const target of targets) {
        scene.add(target.entity);
      }
    </script>
  </body>
</html>
