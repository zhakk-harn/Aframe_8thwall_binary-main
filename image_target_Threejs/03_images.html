<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>03 — Images (Three.js)</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      canvas {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.178.0",
          "three/addons/": "https://esm.sh/three@0.178.0/examples/jsm/"
        }
      }
    </script>

    <!-- 8th Wall Engine -->
    <script async src="../engine/xr.js" data-preload-chunks="slam"></script>
  </head>
  <body>
    <canvas id="xr-canvas"></canvas>

    <script type="module">
      import * as THREE from "three";
      import {
        startXR8,
        applyTargetPose,
        XR83Image,
      } from "./lib/xr8-three-bootstrap.js";

      // all the shared loaders
      // one for each asset type
      const textureLoader = new THREE.TextureLoader();

      // a Object<label, Promise<asset> || asset>
      const assets = {
        export1: textureLoader.loadAsync("../assets/export1.png"),
      };

      // the loading af all assets in "parrallel"
      await Promise.all(
        Object.entries(assets).map(async ([k, v]) => {
          // is it then-able? i.e. is it a Promise?
          // if so await it
          if (v.then) {
            assets[k] = await v;
          }
        }),
      ); // so now `assets` is a Object<label,asset>

      const targets = [
        {
          name: "my-poster",
          type: "PLANAR",
          imagePath: "../assets/Targets/Target_1000055040.jpg",
          metadata: {
            entity: new XR83Image(assets.export1),
          },
          properties: {
            left: 0,
            top: 0,
            width: 830,
            height: 830,
            originalWidth: 830,
            originalHeight: 830,
            isRotated: false,
          },
        },
        {
          name: "cat-poster",
          type: "PLANAR",
          imagePath: "../assets/Targets/Target_cat.jpg",
          metadata: {
            entity: new XR83Image(assets.export1),
          },
          properties: {
            left: 0,
            top: 0,
            width: 830,
            height: 830,
            originalWidth: 830,
            originalHeight: 830,
            isRotated: false,
          },
        },
      ];

      // --- Start XR8 ---
      // TODO hidde the complexity because it doesn't require change from the POV of the user of XR83
      const { scene } = await startXR8({
        canvas: document.getElementById("xr-canvas"),
        imageTargets: targets,
        onImageFound: (detail) => {
          const preventDefault = detail.metadata.entity.onImageFound(detail);

          if (!preventDefault && typeof preventDefault != "undefined") {
            return;
          }

          // common part for every entity type
          // TODO?
        },
        onImageUpdated: (detail) => {
          const preventDefault = detail.metadata.entity.onImageUpdated(detail);

          if (!preventDefault && typeof preventDefault != "undefined") {
            return;
          }

          // common part for every entity type
          // TODO?
        },
        onImageLost: (detail) => {
          const preventDefault = detail.metadata.entity.onImageLost(detail);

          if (!preventDefault && typeof preventDefault != "undefined") {
            return;
          }

          // common part for every entity type
          // TODO?
        },
      });

      for (const target of targets) {
        scene.add(target.metadata.entity);
      }
    </script>
  </body>
</html>
