<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>07 — p5.js Sketch (Three.js)</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    canvas#xr-canvas { display: block; position: fixed; top: 0; left: 0; width: 100% !important; height: 100% !important; }
  </style>

  <!-- p5.js v1.9.4 (NOT v2.x — breaking changes to instance mode) -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

  <script type="importmap">
  { "imports": {
      "three": "https://esm.sh/three@0.178.0",
      "three/addons/": "https://esm.sh/three@0.178.0/examples/jsm/"
  } }
  </script>

  <!-- 8th Wall Engine -->
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>
</head>
<body>
  <canvas id="xr-canvas"></canvas>

  <script type="module">
    import * as THREE from 'three';
    import { startXR8, applyTargetPose } from './lib/xr8-three-bootstrap.js';

    const group = new THREE.Group();
    group.visible = false;

    // --- p5.js sketch (instance mode, hidden canvas) ---
    const P5_SIZE = 256;
    let p5Canvas = null;
    let canvasTexture = null;

    const container = document.createElement('div');
    container.style.display = 'none';
    document.body.appendChild(container);

    new p5(function (p) {
      p.setup = function () {
        const c = p.createCanvas(P5_SIZE, P5_SIZE);
        c.parent(container);
        p5Canvas = c.elt;
      };
      p.draw = function () {
        p.clear();
        const t = p.millis() * 0.001;
        for (let i = 0; i < 6; i++) {
          const angle = t + i * (p.TWO_PI / 6);
          const x = p.width / 2 + p.cos(angle) * 60;
          const y = p.height / 2 + p.sin(angle) * 60;
          p.noStroke();
          p.fill(
            127 + 127 * p.sin(t + i * 0.5),
            127 + 127 * p.sin(t + i * 0.7 + 2),
            127 + 127 * p.sin(t + i * 0.9 + 4),
            200
          );
          p.ellipse(x, y, 40 + 10 * p.sin(t * 2 + i), 40 + 10 * p.sin(t * 2 + i));
        }
        // Center circle
        p.fill(255);
        p.ellipse(p.width / 2, p.height / 2, 20 + 10 * p.sin(t * 3));
      };
    });

    // --- Plane mesh with p5 canvas as texture ---
    const planeMat = new THREE.MeshBasicMaterial({ transparent: true });
    const planeMesh = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 1.5), planeMat);
    planeMesh.position.set(0, 0.75, 0);
    group.add(planeMesh);

    // --- Start XR8 ---
    const { scene } = await startXR8({
      canvas: document.getElementById('xr-canvas'),
      imageTargets: [{
        name: 'my-poster',
        type: 'PLANAR',
        imagePath: '../assets/Targets/Target_1000055040.jpg',
        properties: {
          left: 0, top: 0,
          width: 830, height: 830,
          originalWidth: 830, originalHeight: 830,
          isRotated: false
        }
      }],
      onImageFound: (detail) => {
        applyTargetPose(group, detail);
        group.visible = true;
      },
      onImageUpdated: (detail) => {
        applyTargetPose(group, detail);
      },
      onImageLost: () => {
        group.visible = false;
      },
      onRenderLoop: () => {
        if (!p5Canvas) return;
        if (!canvasTexture) {
          canvasTexture = new THREE.CanvasTexture(p5Canvas);
          planeMat.map = canvasTexture;
          planeMat.needsUpdate = true;
        }
        canvasTexture.needsUpdate = true;
      }
    });

    scene.add(group);
  </script>
</body>
</html>
